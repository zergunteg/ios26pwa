<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="iOS26 AppBar" />
    <script>
      (() => {
        try {
          const nav = performance.getEntriesByType("navigation")[0];
          let direction = sessionStorage.getItem("nav-direction") || "";
          if (!direction && nav && nav.type === "back_forward") direction = "pop";
          if (!direction && nav && nav.type === "navigate") direction = "push";
          if (!direction) direction = "none";
          document.documentElement.setAttribute("data-nav-direction", direction);
          sessionStorage.removeItem("nav-direction");
        } catch {
          document.documentElement.setAttribute("data-nav-direction", "none");
        }
      })();
    </script>
    <title>4 элемента в таббаре</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="tabbar-list-4">
    <div class="app-shell">
      <header class="appbar">
        <button class="appbar-btn close-btn" data-back-to-home data-back-href="tabbar-list.html" aria-label="Назад">
          <img class="appbar-icon appbar-icon-back appbar-icon-toned" src="icons/chevron-left.svg" alt="" aria-hidden="true" />
        </button>
        <button class="appbar-btn reload-btn" id="reload-btn" aria-label="Обновить">
          <img class="appbar-icon appbar-icon-toned" src="icons/reload.svg" alt="" aria-hidden="true" />
        </button>
        <h1 class="title">4 элемента в таббаре</h1>
      </header>

      <main class="screen screen--tabbar-list">
        <h2 class="content-title">4 элемента в таббаре</h2>
        <div class="cards" id="cards"></div>
      </main>

      <nav class="tabbar-wrap" aria-label="Таббар">
        <div class="tabbar">
          <span class="tabbar-active" aria-hidden="true"></span>
          <input class="tabbar-input" type="radio" name="tabbar-4" id="tabbar-4-1" checked />
          <label class="tabbar-tab" for="tabbar-4-1">
            <span class="tabbar-tab-icon" aria-hidden="true">
              <img class="tabbar-tab-icon-img tabbar-tab-icon-img--idle" src="icons/tab-star-idle.svg" alt="" />
              <img class="tabbar-tab-icon-img tabbar-tab-icon-img--active" src="icons/tab-star-active.svg" alt="" />
            </span>
            <span class="tabbar-tab-label">Лента</span>
          </label>
          <input class="tabbar-input" type="radio" name="tabbar-4" id="tabbar-4-2" />
          <label class="tabbar-tab" for="tabbar-4-2">
            <span class="tabbar-tab-icon" aria-hidden="true">
              <img class="tabbar-tab-icon-img tabbar-tab-icon-img--idle" src="icons/tab-star-idle.svg" alt="" />
              <img class="tabbar-tab-icon-img tabbar-tab-icon-img--active" src="icons/tab-star-active.svg" alt="" />
            </span>
            <span class="tabbar-tab-label">Поиск</span>
          </label>
          <input class="tabbar-input" type="radio" name="tabbar-4" id="tabbar-4-3" />
          <label class="tabbar-tab" for="tabbar-4-3">
            <span class="tabbar-tab-icon" aria-hidden="true">
              <img class="tabbar-tab-icon-img tabbar-tab-icon-img--idle" src="icons/tab-star-idle.svg" alt="" />
              <img class="tabbar-tab-icon-img tabbar-tab-icon-img--active" src="icons/tab-star-active.svg" alt="" />
            </span>
            <span class="tabbar-tab-label">Избранное</span>
          </label>
          <input class="tabbar-input" type="radio" name="tabbar-4" id="tabbar-4-4" />
          <label class="tabbar-tab" for="tabbar-4-4">
            <span class="tabbar-tab-icon" aria-hidden="true">
              <img class="tabbar-tab-icon-img tabbar-tab-icon-img--idle" src="icons/tab-star-idle.svg" alt="" />
              <img class="tabbar-tab-icon-img tabbar-tab-icon-img--active" src="icons/tab-star-active.svg" alt="" />
            </span>
            <span class="tabbar-tab-label">Профиль</span>
          </label>
        </div>
      </nav>

      <template id="card-template">
        <section class="card">
          <p>
            <span class="card-leading" aria-hidden="true"><img src="icons/card-star.svg" alt=""/></span>
            <span>Card title</span>
          </p>
        </section>
      </template>
    </div>

    <script src="app.js"></script>
  </body>
</html>
