<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="iOS26 AppBar" />
    <script>
      (() => {
        try {
          const nav = performance.getEntriesByType("navigation")[0];
          let direction = sessionStorage.getItem("nav-direction") || "";
          if (!direction && nav && nav.type === "back_forward") direction = "pop";
          if (!direction && nav && nav.type === "navigate") direction = "push";
          if (!direction) direction = "none";
          document.documentElement.setAttribute("data-nav-direction", direction);
          sessionStorage.removeItem("nav-direction");
        } catch {
          document.documentElement.setAttribute("data-nav-direction", "none");
        }
      })();
    </script>
    <title>iOS26 AppBar Test</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
