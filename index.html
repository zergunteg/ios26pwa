<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="iOS26 Topbar" />
    <title>iOS26 Topbar Test</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <style>
      :root {
        --bg-top: #f7f8fb;
        --bg-bottom: #eceff6;
        --surface: rgba(255, 255, 255, 0.72);
        --surface-border: rgba(255, 255, 255, 0.85);
        --text-primary: #1c1c1e;
        --icon-color: #333333;
        --appbar-height: 70px;
        --close-size: 44px;
        --icon-size: 24px;
        --title-size: 17px;
        --left-gap: 16px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
        color: var(--text-primary);
        background: linear-gradient(170deg, var(--bg-top), var(--bg-bottom));
      }

      body {
        padding-top: env(safe-area-inset-top);
      }

      .appbar {
        position: sticky;
        top: 0;
        height: var(--appbar-height);
        backdrop-filter: blur(24px) saturate(160%);
        -webkit-backdrop-filter: blur(24px) saturate(160%);
        background: var(--surface);
        border-bottom: 1px solid rgba(60, 60, 67, 0.15);
        box-shadow: inset 0 1px 0 var(--surface-border);
      }

      .close-btn {
        position: absolute;
        left: var(--left-gap);
        top: 50%;
        transform: translateY(-50%);
        width: var(--close-size);
        height: var(--close-size);
        border: none;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.55);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      .close-btn:active {
        transform: translateY(-50%) scale(0.96);
      }

      .title {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        margin: 0;
        font-size: var(--title-size);
        line-height: 1;
        font-weight: 700;
        letter-spacing: -0.02em;
        white-space: nowrap;
      }

      .screen {
        min-height: calc(100vh - env(safe-area-inset-top) - var(--appbar-height));
        padding: 20px 16px 40px;
      }

      .card {
        border-radius: 20px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 10px 24px rgba(22, 28, 45, 0.08);
      }

      .card p {
        margin: 0;
        font-size: 15px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <header class="appbar">
      <button class="close-btn" aria-label="Закрыть">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <g clip-path="url(#clip0_90085_719)">
            <mask id="mask0_90085_719" style="mask-type: alpha" maskUnits="userSpaceOnUse" x="3" y="3" width="19" height="18">
              <path d="M4.31703 20.4484C3.85511 19.9972 3.86586 19.2023 4.31703 18.7619L10.9235 12.1447L4.31703 5.53822C3.86586 5.09779 3.85511 4.31361 4.31703 3.84095C4.77894 3.37904 5.56312 3.38978 6.01429 3.84095L12.6207 10.4474L19.2272 3.84095C19.6891 3.38978 20.4518 3.38978 20.9244 3.8517C21.3971 4.30287 21.3864 5.08705 20.9352 5.53822L14.3287 12.1447L20.9352 18.7619C21.3864 19.213 21.3864 19.9865 20.9244 20.4484C20.4625 20.921 19.6891 20.9103 19.2272 20.4591L12.6207 13.8527L6.01429 20.4591C5.56312 20.9103 4.78968 20.9103 4.31703 20.4484Z" fill="black"/>
            </mask>
            <g mask="url(#mask0_90085_719)">
              <rect width="24" height="24" fill="#333333"/>
            </g>
          </g>
          <defs>
            <clipPath id="clip0_90085_719">
              <rect width="24" height="24" fill="white"/>
            </clipPath>
          </defs>
        </svg>
      </button>
      <h1 class="title">Демо Навигации</h1>
    </header>

    <main class="screen">
      <section class="card">
        <p>Тестовая страница для настройки верхнего бара под iOS26. Меняйте стили прямо в CSS и пушьте в GitHub Pages для проверки на телефоне через PWA.</p>
      </section>
    </main>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
