<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="iOS26 AppBar" />
    <script>
      (() => {
        try {
          const nav = performance.getEntriesByType("navigation")[0];
          let direction = sessionStorage.getItem("nav-direction") || "";
          if (!direction && nav && nav.type === "back_forward") direction = "pop";
          if (!direction && nav && nav.type === "navigate") direction = "push";
          if (!direction) direction = "none";
          document.documentElement.setAttribute("data-nav-direction", direction);
          sessionStorage.removeItem("nav-direction");
        } catch {
          document.documentElement.setAttribute("data-nav-direction", "none");
        }
      })();
    </script>
    <title>Цветные фоны</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="color-content">
    <div class="app-shell">
      <header class="appbar">
        <button class="appbar-btn close-btn" data-back-to-home aria-label="Назад">
          <img class="appbar-icon appbar-icon-back appbar-icon-toned" src="icons/chevron-left.svg" alt="" aria-hidden="true" />
        </button>
        <button class="appbar-btn reload-btn" id="reload-btn" aria-label="Обновить">
          <img class="appbar-icon appbar-icon-toned" src="icons/reload.svg" alt="" aria-hidden="true" />
        </button>
        <h1 class="title">Цветные фоны</h1>
      </header>

      <main class="screen screen--color-content">
        <h2 class="content-title">Цветные фоны</h2>

        <section class="color-content-rect" data-appbar-zone data-appbar-color="#2f3f5b" style="--zone-bg: #2f3f5b;">
          <h3 class="color-content-rect-title">Синий блок</h3>
        </section>

        <section class="color-content-rect" data-appbar-zone data-appbar-color="#3f4e37" style="--zone-bg: #3f4e37;">
          <h3 class="color-content-rect-title">Оливковый блок</h3>
        </section>

        <section class="color-content-rect" data-appbar-zone data-appbar-color="#5a3851" style="--zone-bg: #5a3851;">
          <h3 class="color-content-rect-title">Графитовый блок</h3>
        </section>

        <section class="color-content-rect" data-appbar-zone data-appbar-color="#355d5b" style="--zone-bg: #355d5b;">
          <h3 class="color-content-rect-title">Бирюзовый блок</h3>
        </section>

        <section class="color-content-rect" data-appbar-zone data-appbar-color="#6a4d31" style="--zone-bg: #6a4d31;">
          <h3 class="color-content-rect-title">Терракотовый блок</h3>
        </section>

        <section class="color-content-rect" data-appbar-zone data-appbar-color="#3a3f66" style="--zone-bg: #3a3f66;">
          <h3 class="color-content-rect-title">Индиго блок</h3>
        </section>

        <section class="color-content-rect" data-appbar-zone data-appbar-color="#5a2f3f" style="--zone-bg: #5a2f3f;">
          <h3 class="color-content-rect-title">Винный блок</h3>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
